name: CD

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tf/**"
      - "openapi.yaml"
      - "pyproject.toml"
      - ".github/workflows/cd.yml"
  workflow_dispatch:

env:
  AWS_REGION: "ap-northeast-1"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to AWS

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@b47578312673ae6fa5b5096b330d9fbac3d116df # v4.2.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install uv
        uses: astral-sh/setup-uv@6b9c6063abd6010835644d4c2e1bef4cf5cd0fca # v6.0.1
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Build docs
        run: npx --yes @redocly/cli build-docs openapi.yaml --output src/nandemo_oshirase/docs.html

      - name: Run tests before deployment
        run: uv run pytest --cov-report=term

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: "~1.9.0"

      - name: Terraform Init
        run: |
          cd tf
          terraform init \
            -backend-config="bucket=${{ secrets.TERRAFORM_STATE_BUCKET }}" \
            -backend-config="key=nandemo-oshirase/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Apply
        run: |
          cd tf
          terraform apply \
            -var="line_channel_token=${{ secrets.LINE_CHANNEL_TOKEN }}" \
            -var="line_user_id=${{ secrets.LINE_USER_ID }}" \
            -auto-approve

      - name: Test Lambda deployment
        run: |
          API_ENDPOINT=$(cd tf && terraform output -raw api_endpoint)
          API_KEY=$(cd tf && terraform output -raw api_key)

          RESPONSE=$(curl -s -X POST "$API_ENDPOINT" \
            -H "x-api-key: $API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"message": "GitHub Actions deployment completed!"}')

          echo "Response: $RESPONSE"

          if echo "$RESPONSE" | grep -q "Successfully sent"; then
            echo "Deployment test passed!"
          else
            echo "Deployment test failed!"
            exit 1
          fi
