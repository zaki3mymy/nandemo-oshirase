<!DOCTYPE html>
<html>
<head>
  <title>なんでもお知らせくん API</title>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" type="text/css" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" >
</head>
<body>
<div id="swagger-ui"></div>
<script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"> </script>
<script>
const spec = {
  openapi: "3.0.0",
  info: {
    title: "なんでもお知らせくん API",
    description: "LINE通知を送信するAPI",
    version: "1.0.0"
  },
  paths: {
    "/notify": {
      post: {
        summary: "Send notification",
        description: "LINEにメッセージを送信する",
        security: [{ ApiKeyAuth: [] }],
        requestBody: {
          required: true,
          content: {
            "application/json": {
              schema: {
                oneOf: [
                  {
                    type: "object",
                    properties: {
                      message: { type: "string", description: "送信するメッセージ" }
                    },
                    required: ["message"]
                  },
                  {
                    type: "object",
                    properties: {
                      messages: {
                        type: "array",
                        items: { type: "string" },
                        description: "送信するメッセージのリスト"
                      }
                    },
                    required: ["messages"]
                  }
                ]
              },
              examples: {
                single: {
                  summary: "Single message",
                  value: { message: "Hello from なんでもお知らせくん!" }
                },
                multiple: {
                  summary: "Multiple messages",
                  value: { messages: ["Message 1", "Message 2"] }
                }
              }
            }
          }
        },
        responses: {
          "200": {
            description: "Successfully sent",
            content: {
              "application/json": {
                schema: {
                  type: "object",
                  properties: {
                    message: { type: "string", example: "Successfully sent 1 message(s)" }
                  }
                }
              }
            }
          },
          "400": {
            description: "Invalid request",
            content: {
              "application/json": {
                schema: {
                  type: "object",
                  properties: {
                    error: { type: "string" }
                  }
                },
                examples: {
                  no_message: { value: { error: "No message or messages key found" } },
                  empty: { value: { error: "No valid messages to send" } }
                }
              }
            }
          },
          "500": {
            description: "Server error",
            content: {
              "application/json": {
                schema: {
                  type: "object",
                  properties: {
                    error: { type: "string" }
                  }
                }
              }
            }
          }
        }
      }
    }
  },
  components: {
    securitySchemes: {
      ApiKeyAuth: {
        type: "apiKey",
        in: "header",
        name: "x-api-key"
      }
    }
  }
};

window.onload = function() {
  SwaggerUIBundle({
    spec: spec,
    dom_id: '#swagger-ui',
    presets: [
      SwaggerUIBundle.presets.apis,
      SwaggerUIBundle.SwaggerUIStandalonePreset
    ],
    layout: "BaseLayout"
  });
};
</script>
</body>
</html>
